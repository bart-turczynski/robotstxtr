# Full cross-platform R CMD check matrix (macOS = 10x, Windows = 2x Actions
# minute multipliers). Runs ONLY on demand (workflow_dispatch) or when preparing
# a CRAN submission (release tags matching 'v*'). Routine merges to main and PRs
# do NOT trigger it. Fast per-PR feedback (lint + one Ubuntu --as-cran check +
# coverage + README-sync) lives in verify.yml.
#
# Because this package ships a VENDORED C++ engine (LinkingTo: cpp11,
# SystemRequirements: C++17), every entry exercises the native compile, and one
# Linux entry pins the Clang toolchain so the matrix covers "Linux with GCC and
# Clang". Deeper C++ correctness (ASAN/UBSAN, valgrind) lives in sanitizers.yml.
#
# rurl is not yet on CRAN in the required version, so setup-r points at the
# author's R-universe staging repo via `extra-repositories`. Remove once
# ROBO-ufxrxxga is unblocked.
name: Full platform check

on:
  # CRAN-submission prep: release tags matching 'v*'.
  push:
    tags: ['v*']
  # On demand.
  workflow_dispatch:

permissions: read-all

concurrency:
  group: full-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }}${{ matrix.config.compiler && format(', {0}', matrix.config.compiler) || '' }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: ubuntu-latest,  r: 'release', compiler: 'clang'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          # Temporary CRAN-like staging repo: CRAN does not yet provide the
          # required rurl release. Remove once ROBO-ufxrxxga is unblocked.
          extra-repositories: https://bart-turczynski.r-universe.dev

      # Compile the vendored C++ with Clang on the designated Linux entry so the
      # matrix covers "Linux with GCC and Clang". All other Linux entries use
      # the default GCC toolchain. Written before dependency install/check so
      # the package's own native code builds under clang/clang++.
      - name: Use Clang toolchain
        if: matrix.config.compiler == 'clang'
        run: |
          mkdir -p ~/.R
          {
            echo "CC=clang"
            echo "CXX=clang++"
            echo "CXX11=clang++"
            echo "CXX14=clang++"
            echo "CXX17=clang++"
            echo "CXX20=clang++"
          } >> ~/.R/Makevars
          clang --version
          clang++ --version

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          # The strict CRAN-grade pass: --as-cran across every platform. This is
          # what CRAN itself runs, so it is the gate before a release.
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true
          build_args: 'c("--no-manual")'
