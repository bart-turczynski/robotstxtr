# Build the pkgdown site and publish it via the native GitHub Actions Pages
# path (Pages source = "GitHub Actions"), mirroring the rurl setup. The build
# needs no live network — examples and vignettes are mocked/served locally — so
# no network steps are added.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # Temporary CRAN-like staging repo: CRAN does not yet provide the
          # required rurl release. Remove once ROBO-ufxrxxga is unblocked.
          extra-repositories: https://bart-turczynski.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # Deploy through the native GitHub Actions Pages path (source = "GitHub
  # Actions"), guarded by a single-flight concurrency group. This avoids the
  # old gh-pages branch push, whose per-push auto "pages build and deployment"
  # runs race each other on rapid successive merges to main.
  deploy:
    if: github.event_name != 'pull_request'
    needs: pkgdown
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
