# Cross-platform R CMD check matrix — the CRAN and platform gate (PRD.md §9).
#
# Covers the required platform/toolchain matrix for a package that ships a
# VENDORED C++ engine (LinkingTo: cpp11, SystemRequirements: C++17), so every
# entry exercises the native compile:
#   - Linux (ubuntu-latest) on R devel, release, and oldrel-1  [default GCC]
#   - Linux (ubuntu-latest) on R release with the Clang toolchain
#   - macOS (macos-latest)  on R release                        [Apple Clang]
#   - Windows (windows-latest) on R release                     [UCRT]
# Runs --as-cran and treats warnings as errors. The package needs NO live
# network for install/tests/examples/vignettes, so no network steps are added;
# Suggests are installed (needs: check) so the full test + vignette gate runs.
name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: R-CMD-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }}${{ matrix.config.compiler && format(', {0}', matrix.config.compiler) || '' }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
          - {os: ubuntu-latest,  r: 'release', compiler: 'clang'}
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Suggests are installed below, so keep the strict default. Left explicit
      # to document that the test/vignette gate is expected to run in full.
      _R_CHECK_FORCE_SUGGESTS_: true
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # Compile the vendored C++ with Clang on the designated Linux entry so the
      # matrix covers "Linux with GCC and Clang" (§9). All other Linux entries
      # use the default GCC toolchain. Written before dependency install/check
      # so the package's own native code builds under clang/clang++.
      - name: Use Clang toolchain
        if: matrix.config.compiler == 'clang'
        run: |
          mkdir -p ~/.R
          {
            echo "CC=clang"
            echo "CXX=clang++"
            echo "CXX11=clang++"
            echo "CXX14=clang++"
            echo "CXX17=clang++"
            echo "CXX20=clang++"
          } >> ~/.R/Makevars
          clang --version
          clang++ --version

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # rcmdcheck drives the check; Suggests (httpuv, callr, cucumber,
          # knitr, rmarkdown, testthat) come in via needs: check so tests and
          # vignettes run.
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          # Strict CRAN-grade pass on every platform, warnings fatal.
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true
          build_args: 'c("--no-manual")'
