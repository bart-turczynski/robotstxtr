# Fast verification gate: lint + a single Ubuntu --as-cran R CMD check +
# coverage + README-sync, on every push to main and every PR. Full
# cross-platform coverage (and the vendored-C++ toolchain matrix) lives in
# full-check.yml; the ASAN/valgrind sanitizer runs live in sanitizers.yml.
# Named "R-CMD-check" so tooling that discovers CI by the conventional workflow
# name (e.g. pkgcheck's `cmd|coverage` heuristic) sees it.
#
# rurl is not yet on CRAN in the required version, so every job that installs
# the package's dependencies points setup-r at the author's R-universe staging
# repo via `extra-repositories`. Remove once ROBO-ufxrxxga is unblocked.
name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      LINTR_ERROR_ON_LINT: true
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # Temporary CRAN-like staging repo: CRAN does not yet provide the
          # required rurl release. Remove once ROBO-ufxrxxga is unblocked.
          extra-repositories: https://bart-turczynski.r-universe.dev
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}

  readme:
    runs-on: ubuntu-latest
    name: README in sync with README.Rmd
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # Temporary CRAN-like staging repo: CRAN does not yet provide the
          # required rurl release. Remove once ROBO-ufxrxxga is unblocked.
          extra-repositories: https://bart-turczynski.r-universe.dev
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # devtools::build_readme() installs the package (compiling the
          # vendored C++) and re-renders README.Rmd before checking sync.
          extra-packages: any::devtools
          needs: check
      - name: Re-render README.md from README.Rmd
        run: devtools::build_readme()
        shell: Rscript {0}
      - name: Fail if README.md is out of date
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error file=README.md::README.md is out of sync with README.Rmd. Run devtools::build_readme() and commit the result."
            exit 1
          fi

  check:
    needs: lint
    runs-on: ubuntu-latest
    name: R CMD check (ubuntu-latest, release)
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # Temporary CRAN-like staging repo: CRAN does not yet provide the
          # required rurl release. Remove once ROBO-ufxrxxga is unblocked.
          extra-repositories: https://bart-turczynski.r-universe.dev
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          # Strict CRAN-grade pass on the fast gate, warnings fatal. The
          # cross-platform matrix repeats this on macOS/Windows/oldrel in
          # full-check.yml.
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true
          build_args: 'c("--no-manual")'

  vendor-fidelity:
    runs-on: ubuntu-latest
    name: Vendored Yandex byte-fidelity
    # Exercises the REAL src/vendor/robotstxtyandex tree against the frozen
    # manifest -- byte fidelity that check-time testthat cannot see, because R
    # does not install src/ (the installed package has no vendored tree). This
    # job runs where src/ IS present: the source checkout. dev/verify-yandex-
    # vendor.R is base-R only (tools::sha256sum + read.dcf; R >= 4.5, satisfied
    # by setup-r 'release'), so it needs no dependency install, no compilation,
    # no package load, and no staging repo. A peer job (no `needs:`) so it runs
    # in parallel and its failure is independently attributable.
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Verify vendored Yandex tree matches the frozen manifest
        run: Rscript dev/verify-yandex-vendor.R

  coverage:
    needs: check
    runs-on: ubuntu-latest
    name: Test coverage
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # Temporary CRAN-like staging repo: CRAN does not yet provide the
          # required rurl release. Remove once ROBO-ufxrxxga is unblocked.
          extra-repositories: https://bart-turczynski.r-universe.dev
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage
      - name: Measure coverage
        run: |
          cov <- covr::package_coverage(quiet = FALSE)
          covr::to_cobertura(cov)
        shell: Rscript {0}
      - uses: codecov/codecov-action@v7
        with:
          files: ./cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
