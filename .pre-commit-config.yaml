# Overrides the shared config's `verify` hook. The build/check runs against a
# clean `git archive HEAD` export (see dev/verify.sh) rather than the working
# tree, so a live browser socket under _scratch/ can no longer break R CMD
# build's copy step and block the push.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: mixed-line-ending
      - id: check-case-conflict
  - repo: local
    hooks:
      - id: verify
        name: verify (mirrors CI)
        entry: dev/verify.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        verbose: true
